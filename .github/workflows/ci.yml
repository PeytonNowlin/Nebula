name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: build · test · lint
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Python is required: the transpiler backend emits a Python package and the
      # interpreter/Python parity tests shell out to `python3`.
      - name: Install Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      # Advisory for now (16 known warnings). Promote to `-- -D warnings` once the
      # backlog is cleared so lint regressions fail the build.
      - name: Clippy
        run: cargo clippy --all-targets

      - name: Build
        run: cargo build --all --locked

      - name: Test (Rust unit/integration/e2e + Python parity)
        run: cargo test --all

      # The "author in Nebula, ship as Python" path: compile a program to a
      # Python package and run the emitted artifact, exactly as a deployment
      # pipeline would. See docs/author-in-nebula-ship-as-python.md.
      - name: Build & run Python deployment artifact
        run: |
          cargo run --release -- compile examples/import_demo.neb --target python --out dist/
          python dist/examples/import_demo.py

      # Shared-runtime deploy path: pip-install nebula_runtime once, then run a
      # compiled program with its vendored copy removed. See python/README.md.
      - name: Verify pip-installable nebula_runtime
        run: |
          pip install ./python
          cargo run --release -- compile examples/hello.neb --target python --out shared/
          rm -rf shared/nebula_runtime
          python shared/hello.py
