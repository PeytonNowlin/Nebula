name: Publish nebula-runtime

# Publishes the python/ package (nebula-runtime) to PyPI via manual dispatch.
# Uses PyPI Trusted Publishing (OIDC) — no API token required, but the PyPI
# project must first be configured with this repo + workflow as a trusted
# publisher: https://docs.pypi.org/trusted-publishers/
# (Run with: gh workflow run publish-runtime.yml. The 0.1.0 release was published
# manually with an API token before trusted publishing was set up.)
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build python/ --outdir dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
