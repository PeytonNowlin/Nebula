# Canonical Nebula builtin surface.
# Consumed by nebula-types (signatures), nebula-runtime (dispatch names),
# nebula-python (emit), and validated against python/nebula_runtime/builtins.py.

[[builtin]]
name = "print"
params = [{ name = "value", type = "Str" }]
returns = "Void"

[[builtin]]
name = "len"
returns = "Int"
checker = "len"

[[builtin]]
name = "push"
returns = "Void"
checker = "push"

[[builtin]]
name = "at"
checker = "at"

[[builtin]]
name = "get"
checker = "get"

[[builtin]]
name = "has"
returns = "Bool"
checker = "has"

[[builtin]]
name = "insert"
returns = "Void"
checker = "insert"

[[builtin]]
name = "str_to_int"
params = [{ name = "s", type = "Str" }]
returns = "Int"

[[builtin]]
name = "int_to_str"
params = [{ name = "n", type = "Int" }]
returns = "Str"

[[builtin]]
name = "str_to_float"
params = [{ name = "s", type = "Str" }]
returns = "Float"

[[builtin]]
name = "float_to_str"
params = [{ name = "f", type = "Float" }]
returns = "Str"

[[builtin]]
name = "int_to_float"
params = [{ name = "n", type = "Int" }]
returns = "Float"

[[builtin]]
name = "float_to_int"
params = [{ name = "f", type = "Float" }]
returns = "Int"

# String operations. All indices and lengths are in Unicode code points, and
# both backends (interpreter and Python) produce identical results.

[[builtin]]
name = "substr"
params = [
  { name = "s", type = "Str" },
  { name = "start", type = "Int" },
  { name = "end", type = "Int" },
]
returns = "Str"

[[builtin]]
name = "contains"
params = [{ name = "s", type = "Str" }, { name = "needle", type = "Str" }]
returns = "Bool"

[[builtin]]
name = "index_of"
params = [{ name = "s", type = "Str" }, { name = "needle", type = "Str" }]
returns = "Int"

[[builtin]]
name = "starts_with"
params = [{ name = "s", type = "Str" }, { name = "prefix", type = "Str" }]
returns = "Bool"

[[builtin]]
name = "ends_with"
params = [{ name = "s", type = "Str" }, { name = "suffix", type = "Str" }]
returns = "Bool"

[[builtin]]
name = "to_upper"
params = [{ name = "s", type = "Str" }]
returns = "Str"

[[builtin]]
name = "to_lower"
params = [{ name = "s", type = "Str" }]
returns = "Str"

[[builtin]]
name = "trim"
params = [{ name = "s", type = "Str" }]
returns = "Str"

[[builtin]]
name = "replace"
params = [
  { name = "s", type = "Str" },
  { name = "from", type = "Str" },
  { name = "to", type = "Str" },
]
returns = "Str"